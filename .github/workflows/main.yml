---
name: CI & Release

# Workflow name based on selected inputs. Falls back to default GitHub naming
# when the expression evaluates to an empty string.
run-name: >-
  ${{
    inputs.release && inputs.test && format('Build {0} ➤ Test ➤ Publish to NPM', github.ref_name)  ||
    inputs.release && !inputs.test && format('Build {0} ➤ Skip Tests ➤ Publish to NPM', github.ref_name) ||
    github.event_name == 'workflow_dispatch' && inputs.test && format('Build {0} ➤ Test', github.ref_name) ||
    github.event_name == 'workflow_dispatch' && !inputs.test && format('Build {0} ➤ Skip Tests', github.ref_name) ||
    ''
  }}

on:
  # Build on pushes to branches that have a PR (including drafts).
  pull_request:
  # Build on commits pushed to main without a PR.
  push:
    branches: [main]
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:
    inputs:
      test:
        description: Run tests
        required: true
        default: true
        type: boolean
      release:
        description: Release new version
        required: true
        default: false
        type: boolean

concurrency:
  # On PRs, builds cancel if new pushes happen before CI completes (github.head_ref).
  # Otherwise github.run_id keeps each main-branch run distinct so a queue of merges
  # doesn't auto-cancel each other.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  build:
    runs-on: ubuntu-latest
    name: Lint & Build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: lts/*
      # The dev studio isn't needed to lint/typecheck/build the plugin.
      - run: pnpm install --frozen-lockfile --filter=!studio
      # Linting can be skipped on manual dispatch.
      - run: pnpm run lint
        if: github.event.inputs.test != 'false'
      - run: pnpm run typecheck
        if: github.event.inputs.test != 'false'
      # Build via the publish hook — semantic-release crashes if this fails, so
      # surface it early.
      - run: pnpm run prepublishOnly

  test:
    needs: build
    # The test matrix can be skipped to fast-track a release when main is already green.
    if: github.event.inputs.test != 'false'
    runs-on: ${{ matrix.os }}
    name: Node.js ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      # A failure on Windows doesn't imply one on macOS; let every leg finish.
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node: [lts/*]
        include:
          # Oldest LTS still receiving security patches, and the current line —
          # ubuntu only, since it's the fastest runner.
          - os: ubuntu-latest
            node: lts/-1
          - os: ubuntu-latest
            node: current
    steps:
      # Only needed on Windows; macOS and ubuntu already use LF.
      - name: Set git to use LF
        if: matrix.os == 'windows-latest'
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile --filter=!studio
      - run: pnpm test

  release:
    permissions:
      contents: write # publish a GitHub release + push the changelog/version commit
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
      id-token: write # OIDC trusted publishing to npm (tokenless) + provenance
    needs: [build, test]
    # Run on push to main (after build/test pass) or a manual dispatch with release=true.
    if: always() && needs.build.result != 'failure' && needs.test.result != 'failure' && needs.test.result != 'cancelled' && (github.event_name == 'push' || github.event.inputs.release == 'true')
    runs-on: ubuntu-latest
    name: Semantic release
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so semantic-release can analyze every commit since the last release.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing needs npm >= 11.5.1; the bundled npm may be older.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile --filter=!studio
      # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing, which
      # requires a trusted publisher configured for this repo + workflow on npmjs.com
      # (set up once after the initial manual publish — OIDC can't publish a brand-new
      # package). Branches that release are defined in .releaserc.json.
      - run: pnpm dlx semantic-release@^25
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
